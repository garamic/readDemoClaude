<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Variation 1: Reassurance-First</title>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
      width: 375px;
      height: 812px;
      margin: 0 auto;
      background: #8cabd8;
      overflow: hidden;
      position: relative;
    }

    /* Status Bar */
    .status-bar {
      height: 44px;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: transparent;
    }

    .time {
      font-size: 15px;
      font-weight: 600;
      color: #000;
      letter-spacing: -0.3px;
    }

    .status-icons {
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .status-icons::after {
      content: '';
      display: block;
      width: 24px;
      height: 12px;
      background: #000;
      border-radius: 3px;
      opacity: 0.4;
    }

    /* Top Navigation */
    .top-nav {
      height: 44px;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: transparent;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
    }

    .back-btn {
      width: 24px;
      height: 24px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 18px;
      color: #111;
    }

    .group-name {
      font-size: 17px;
      font-weight: bold;
      color: #111;
      letter-spacing: -0.25px;
    }

    .nav-right {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .icon-btn {
      width: 24px;
      height: 24px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 20px;
    }

    /* 🎯 VARIATION 1: Stealth Banner */
    .stealth-banner {
      height: 48px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.3);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .stealth-banner.hidden {
      opacity: 0;
      transform: translateY(-10px);
      pointer-events: none;
    }

    .stealth-info {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .eye-icon {
      width: 20px;
      height: 20px;
      opacity: 0.6;
    }

    .stealth-text {
      font-size: 14px;
      color: #64748B;
      font-weight: 500;
    }

    .send-read-btn {
      background: #3B82F6;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(59, 130, 246, 0.3);
      transition: all 0.2s;
    }

    .send-read-btn:active {
      transform: scale(0.95);
      box-shadow: 0 1px 3px rgba(59, 130, 246, 0.3);
    }

    /* Message Area */
    .message-area {
      position: absolute;
      top: 136px;
      left: 0;
      right: 0;
      bottom: 85px;
      overflow-y: auto;
      padding: 20px 8px;
    }

    .system-date {
      text-align: center;
      margin: 20px 0;
    }

    .date-badge {
      display: inline-block;
      background: rgba(0, 0, 0, 0.3);
      color: white;
      font-size: 11px;
      padding: 4px 12px;
      border-radius: 12px;
      letter-spacing: -0.22px;
    }

    .message {
      display: flex;
      gap: 3px;
      margin-bottom: 7px;
    }

    .message.sent {
      flex-direction: row-reverse;
      justify-content: flex-start;
    }

    .profile-pic {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #ccc;
      flex-shrink: 0;
    }

    .message-content {
      max-width: 70%;
    }

    .sender-name {
      font-size: 10px;
      color: #111;
      opacity: 0.7;
      font-weight: 600;
      margin-bottom: 5px;
      padding-left: 5px;
      letter-spacing: -0.1px;
    }

    .bubble-container {
      display: flex;
      align-items: flex-end;
      gap: 5px;
    }

    .message.sent .bubble-container {
      flex-direction: row-reverse;
    }

    .bubble {
      background: white;
      padding: 8px 14px;
      border-radius: 17px;
      font-size: 16px;
      color: #111;
      letter-spacing: -0.3px;
      position: relative;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
    }

    .message.sent .bubble {
      background: #6DE67B;
    }

    .timestamp {
      font-size: 10px;
      color: rgba(0, 0, 0, 0.5);
      white-space: nowrap;
      align-self: flex-end;
      margin-bottom: 4px;
    }

    .read-status {
      font-size: 10px;
      color: rgba(0, 0, 0, 0.5);
      text-align: right;
      margin-bottom: 2px;
    }

    /* Footer */
    .footer {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: white;
      border-top: 1px solid #efefef;
    }

    .input-bar {
      height: 51px;
      padding: 5px;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .tool-btns {
      display: flex;
      gap: 1px;
    }

    .tool-btn {
      width: 40px;
      height: 40px;
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
    }

    .input-field {
      flex: 1;
      height: 34px;
      background: #f5f5f5;
      border: 0.5px solid #efefef;
      border-radius: 17px;
      padding: 0 12px;
      font-size: 15px;
      outline: none;
      letter-spacing: -0.075px;
    }

    .input-field::placeholder {
      color: #c8c8c8;
    }

    .home-indicator {
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .indicator-bar {
      width: 134px;
      height: 5px;
      background: #000;
      border-radius: 100px;
    }

    /* Toast Notification */
    .toast {
      position: fixed;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #22C55E;
      color: white;
      padding: 12px 24px;
      border-radius: 24px;
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 4px 12px rgba(34, 197, 94, 0.4);
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 1000;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
  <!-- Status Bar -->
  <div class="status-bar">
    <div class="time">9:41</div>
    <div class="status-icons"></div>
  </div>

  <!-- Top Navigation -->
  <div class="top-nav">
    <div class="nav-left">
      <button class="back-btn">‹</button>
      <span class="group-name">Group Name</span>
    </div>
    <div class="nav-right">
      <button class="icon-btn">🔍</button>
      <button class="icon-btn">📞</button>
      <button class="icon-btn">☰</button>
    </div>
  </div>

  <!-- 🎯 VARIATION 1: Stealth Mode Banner -->
  <div class="stealth-banner" id="stealthBanner">
    <div class="stealth-info">
      <svg class="eye-icon" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z" opacity="0.3"/>
        <line x1="4" y1="4" x2="20" y2="20" stroke="currentColor" stroke-width="2"/>
      </svg>
      <span class="stealth-text">스텔스 모드</span>
    </div>
    <button class="send-read-btn" id="sendReadBtn">읽음 전송</button>
  </div>

  <!-- Message Area -->
  <div class="message-area">
    <div class="system-date">
      <span class="date-badge">Today</span>
    </div>

    <div class="message received">
      <div class="profile-pic" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);"></div>
      <div class="message-content">
        <div class="sender-name">Member 1</div>
        <div class="bubble-container">
          <div class="bubble">hi guys~~~</div>
          <div class="timestamp">8:23 PM</div>
        </div>
      </div>
    </div>

    <div class="message received">
      <div class="profile-pic" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);"></div>
      <div class="message-content">
        <div class="sender-name">Member 2</div>
        <div class="bubble-container">
          <div class="bubble">hi good morning</div>
          <div class="timestamp">8:23 PM</div>
        </div>
      </div>
    </div>

    <div class="message sent">
      <div class="message-content">
        <div class="bubble-container">
          <div class="read-status">Read</div>
          <div class="timestamp">8:23 PM</div>
          <div class="bubble">good morning</div>
        </div>
      </div>
    </div>

    <div class="message received">
      <div class="profile-pic" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);"></div>
      <div class="message-content">
        <div class="sender-name">Member 2</div>
        <div class="bubble-container">
          <div class="bubble">Did you guys have breakfast?</div>
          <div class="timestamp">8:23 PM</div>
        </div>
      </div>
    </div>

    <div class="message received">
      <div class="profile-pic" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);"></div>
      <div class="message-content">
        <div class="sender-name">Member 1</div>
        <div class="bubble-container">
          <div class="bubble">not yet</div>
          <div class="timestamp">8:23 PM</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <div class="input-bar">
      <div class="tool-btns">
        <button class="tool-btn">+</button>
        <button class="tool-btn">📷</button>
        <button class="tool-btn">🖼️</button>
      </div>
      <input type="text" class="input-field" placeholder="Aa">
      <button class="tool-btn">😊</button>
    </div>
    <div class="home-indicator">
      <div class="indicator-bar"></div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast">읽음 전송됨 ✓</div>

  <script>
    const sendReadBtn = document.getElementById('sendReadBtn');
    const stealthBanner = document.getElementById('stealthBanner');
    const toast = document.getElementById('toast');

    sendReadBtn.addEventListener('click', () => {
      // Hide banner with animation
      stealthBanner.classList.add('hidden');

      // Show toast
      setTimeout(() => {
        toast.classList.add('show');

        // Hide toast after 2 seconds
        setTimeout(() => {
          toast.classList.remove('show');
        }, 2000);
      }, 300);
    });
  </script>
</body>
</html>
