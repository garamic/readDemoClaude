<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Variation 5: Wildcard Concept</title>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
      width: 375px;
      height: 812px;
      margin: 0 auto;
      background: #8cabd8;
      overflow: hidden;
      position: relative;
    }

    .status-bar {
      height: 44px;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: transparent;
    }

    .time {
      font-size: 15px;
      font-weight: 600;
      color: #000;
      letter-spacing: -0.3px;
    }

    .status-icons {
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .status-icons::after {
      content: '';
      display: block;
      width: 24px;
      height: 12px;
      background: #000;
      border-radius: 3px;
      opacity: 0.4;
    }

    .top-nav {
      height: 44px;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: transparent;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
    }

    .back-btn {
      width: 24px;
      height: 24px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 18px;
      color: #111;
    }

    .group-name {
      font-size: 17px;
      font-weight: bold;
      color: #111;
      letter-spacing: -0.25px;
    }

    .nav-right {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .icon-btn {
      width: 24px;
      height: 24px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 20px;
    }

    .message-area {
      position: absolute;
      top: 88px;
      left: 0;
      right: 0;
      bottom: 85px;
      overflow-y: auto;
      padding: 20px 8px;
    }

    .system-date {
      text-align: center;
      margin: 20px 0;
    }

    .date-badge {
      display: inline-block;
      background: rgba(0, 0, 0, 0.3);
      color: white;
      font-size: 11px;
      padding: 4px 12px;
      border-radius: 12px;
      letter-spacing: -0.22px;
    }

    .message {
      display: flex;
      gap: 3px;
      margin-bottom: 7px;
    }

    .message.sent {
      flex-direction: row-reverse;
      justify-content: flex-start;
    }

    /* 🎯 VARIATION 5: Interactive Profile Picture */
    .profile-pic {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #ccc;
      flex-shrink: 0;
      cursor: pointer;
      position: relative;
      transition: transform 0.15s;
      user-select: none;
    }

    .profile-pic:active {
      transform: scale(0.95);
    }

    .profile-pic.pulse {
      animation: profilePulse 0.5s ease-out;
    }

    @keyframes profilePulse {
      0%, 100% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7);
      }
      50% {
        transform: scale(1.1);
        box-shadow: 0 0 0 8px rgba(59, 130, 246, 0);
      }
    }

    .profile-checkmark {
      position: absolute;
      top: -4px;
      right: -4px;
      width: 16px;
      height: 16px;
      background: #22C55E;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 10px;
      font-weight: bold;
      opacity: 0;
      transform: scale(0);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .profile-checkmark.show {
      opacity: 1;
      transform: scale(1);
    }

    .message-content {
      max-width: 70%;
    }

    .sender-name {
      font-size: 10px;
      color: #111;
      opacity: 0.7;
      font-weight: 600;
      margin-bottom: 5px;
      padding-left: 5px;
      letter-spacing: -0.1px;
    }

    .bubble-container {
      display: flex;
      align-items: flex-end;
      gap: 5px;
    }

    .message.sent .bubble-container {
      flex-direction: row-reverse;
    }

    .bubble {
      background: white;
      padding: 8px 14px;
      border-radius: 17px;
      font-size: 16px;
      color: #111;
      letter-spacing: -0.3px;
      position: relative;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
    }

    .message.sent .bubble {
      background: #6DE67B;
    }

    .timestamp {
      font-size: 10px;
      color: rgba(0, 0, 0, 0.5);
      white-space: nowrap;
      align-self: flex-end;
      margin-bottom: 4px;
      transition: color 0.3s;
    }

    .timestamp.read-sent {
      color: #22C55E;
      font-weight: 600;
    }

    .read-status {
      font-size: 10px;
      color: rgba(0, 0, 0, 0.5);
      text-align: right;
      margin-bottom: 2px;
    }

    .footer {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: white;
      border-top: 1px solid #efefef;
    }

    .input-bar {
      height: 51px;
      padding: 5px;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .tool-btns {
      display: flex;
      gap: 1px;
    }

    .tool-btn {
      width: 40px;
      height: 40px;
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
    }

    .input-field {
      flex: 1;
      height: 34px;
      background: #f5f5f5;
      border: 0.5px solid #efefef;
      border-radius: 17px;
      padding: 0 12px;
      font-size: 15px;
      outline: none;
      letter-spacing: -0.075px;
    }

    .input-field::placeholder {
      color: #c8c8c8;
    }

    .home-indicator {
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .indicator-bar {
      width: 134px;
      height: 5px;
      background: #000;
      border-radius: 100px;
    }

    /* Hint Overlay */
    .hint-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .hint-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .hint-box {
      background: white;
      border-radius: 20px;
      padding: 32px 24px;
      max-width: 280px;
      text-align: center;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
    }

    .hint-title {
      font-size: 20px;
      font-weight: bold;
      color: #111;
      margin-bottom: 16px;
    }

    .hint-description {
      font-size: 14px;
      color: #64748B;
      line-height: 1.5;
      margin-bottom: 24px;
    }

    .hint-demo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 24px;
      padding: 16px;
      background: #f5f5f5;
      border-radius: 12px;
    }

    .demo-profile {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      animation: demoPulse 1.5s ease-in-out infinite;
    }

    @keyframes demoPulse {
      0%, 100% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7);
      }
      50% {
        transform: scale(1.05);
        box-shadow: 0 0 0 8px rgba(59, 130, 246, 0);
      }
    }

    .demo-text {
      font-size: 13px;
      color: #3B82F6;
      font-weight: 600;
    }

    .got-it-btn {
      width: 100%;
      background: #3B82F6;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .got-it-btn:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>
  <div class="status-bar">
    <div class="time">9:41</div>
    <div class="status-icons"></div>
  </div>

  <div class="top-nav">
    <div class="nav-left">
      <button class="back-btn">‹</button>
      <span class="group-name">Group Name</span>
    </div>
    <div class="nav-right">
      <button class="icon-btn">🔍</button>
      <button class="icon-btn">📞</button>
      <button class="icon-btn">☰</button>
    </div>
  </div>

  <div class="message-area">
    <div class="system-date">
      <span class="date-badge">Today</span>
    </div>

    <div class="message received" data-message-id="1">
      <div class="profile-pic" data-sender="member1" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
        <div class="profile-checkmark">✓</div>
      </div>
      <div class="message-content">
        <div class="sender-name">Member 1</div>
        <div class="bubble-container">
          <div class="bubble">hi guys~~~</div>
          <div class="timestamp" data-timestamp="1">8:23 PM</div>
        </div>
      </div>
    </div>

    <div class="message received" data-message-id="2">
      <div class="profile-pic" data-sender="member2" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">
        <div class="profile-checkmark">✓</div>
      </div>
      <div class="message-content">
        <div class="sender-name">Member 2</div>
        <div class="bubble-container">
          <div class="bubble">hi good morning</div>
          <div class="timestamp" data-timestamp="2">8:23 PM</div>
        </div>
      </div>
    </div>

    <div class="message sent">
      <div class="message-content">
        <div class="bubble-container">
          <div class="read-status">Read</div>
          <div class="timestamp">8:23 PM</div>
          <div class="bubble">good morning</div>
        </div>
      </div>
    </div>

    <div class="message received" data-message-id="3">
      <div class="profile-pic" data-sender="member2" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">
        <div class="profile-checkmark">✓</div>
      </div>
      <div class="message-content">
        <div class="sender-name">Member 2</div>
        <div class="bubble-container">
          <div class="bubble">Did you guys have breakfast?</div>
          <div class="timestamp" data-timestamp="3">8:23 PM</div>
        </div>
      </div>
    </div>

    <div class="message received" data-message-id="4">
      <div class="profile-pic" data-sender="member1" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
        <div class="profile-checkmark">✓</div>
      </div>
      <div class="message-content">
        <div class="sender-name">Member 1</div>
        <div class="bubble-container">
          <div class="bubble">not yet</div>
          <div class="timestamp" data-timestamp="4">8:23 PM</div>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">
    <div class="input-bar">
      <div class="tool-btns">
        <button class="tool-btn">+</button>
        <button class="tool-btn">📷</button>
        <button class="tool-btn">🖼️</button>
      </div>
      <input type="text" class="input-field" placeholder="Aa">
      <button class="tool-btn">😊</button>
    </div>
    <div class="home-indicator">
      <div class="indicator-bar"></div>
    </div>
  </div>

  <!-- 🎯 VARIATION 5: Hint Overlay -->
  <div class="hint-overlay" id="hintOverlay">
    <div class="hint-box">
      <div class="hint-title">💡 새로운 기능!</div>
      <div class="hint-description">
        프로필 사진을 <strong>더블 탭</strong>하면<br>
        해당 메시지까지 읽음 처리됩니다
      </div>
      <div class="hint-demo">
        <div class="demo-profile"></div>
        <div class="demo-text">👆 더블 탭</div>
      </div>
      <button class="got-it-btn" id="gotItBtn">알겠습니다</button>
    </div>
  </div>

  <script>
    const profilePics = document.querySelectorAll('.profile-pic');
    const hintOverlay = document.getElementById('hintOverlay');
    const gotItBtn = document.getElementById('gotItBtn');

    // Show hint on first load
    setTimeout(() => {
      hintOverlay.classList.add('show');
    }, 500);

    gotItBtn.addEventListener('click', () => {
      hintOverlay.classList.remove('show');
    });

    // Double tap detection for profiles
    profilePics.forEach(profile => {
      let tapCount = 0;
      let tapTimer;

      profile.addEventListener('click', (e) => {
        e.stopPropagation();
        tapCount++;

        if (tapCount === 1) {
          tapTimer = setTimeout(() => {
            tapCount = 0;
          }, 300);
        } else if (tapCount === 2) {
          clearTimeout(tapTimer);
          handleReadReceipt(profile);
          tapCount = 0;
        }
      });
    });

    function handleReadReceipt(profileElement) {
      // Get message element
      const messageElement = profileElement.closest('.message');
      const messageId = messageElement.getAttribute('data-message-id');

      // Pulse animation
      profileElement.classList.add('pulse');

      // Show checkmark
      const checkmark = profileElement.querySelector('.profile-checkmark');
      checkmark.classList.add('show');

      // Update timestamp
      const timestamp = messageElement.querySelector('[data-timestamp]');
      if (timestamp) {
        timestamp.classList.add('read-sent');
        const originalText = timestamp.textContent;
        timestamp.textContent = 'Read';

        setTimeout(() => {
          timestamp.textContent = originalText;
        }, 2000);
      }

      // Remove effects
      setTimeout(() => {
        profileElement.classList.remove('pulse');
        checkmark.classList.remove('show');
        if (timestamp) {
          timestamp.classList.remove('read-sent');
        }
      }, 2500);

      console.log(`Read receipt sent for message ${messageId}`);
    }
  </script>
</body>
</html>
